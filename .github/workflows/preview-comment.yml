name: PR Preview Comment

on:
  pull_request:
    types: 
      - opened
      - synchronize

permissions:
  pull-requests: write

jobs:
  comment:
    name: Post Preview Link
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch
        run: |
          # Cloudflare Pages sanitizes branch names: lowercase, alphanumeric + hyphens, max 28 chars
          BRANCH="${{ github.head_ref }}"
          SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-28 | sed 's/-$//')
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- cloudflare-preview -->'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- cloudflare-preview -->
            ## 🚀 Preview Deployment

            | Environment | URL |
            |-------------|-----|
            | **Branch Preview** | https://${{ steps.branch.outputs.name }}.awesomeledlist.pages.dev |
            | **Commit Preview** | https://${{ github.event.pull_request.head.sha }}.awesomeledlist.pages.dev |

            > **Note:** Preview may take a few minutes to deploy after the commit is pushed.
            > Check the [Cloudflare Pages dashboard](https://dash.cloudflare.com) for deployment status.
