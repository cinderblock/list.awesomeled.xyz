name: Monthly link check

# Sweeps every URL in the database for link rot and keeps one rolling issue
# up to date with the findings (DEAD urls come with ready-to-paste dead_links
# stubs; CHECK urls are blocked/erroring and need a human look).

on:
  schedule:
    - cron: '17 6 3 * *' # 06:17 UTC on the 3rd of each month
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: check-links
  cancel-in-progress: false

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run link checker
        run: |
          bun run check-links | tee check-links.log
        continue-on-error: true

      - name: Create or update the rolling issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('check-links.log', 'utf8');
            // Everything from the first DEAD/CHECK header onward; fall back
            // to the tail so the issue always shows the summary line.
            const start = log.search(/^={10,}$/m);
            const report = (start >= 0 ? log.slice(start) : log.split('\n').slice(-5).join('\n')).trim();
            const summary = (log.match(/^ok \d+ \| dead \d+ \| check \d+$/m) ?? ['(no summary — checker crashed?)'])[0];
            const date = new Date().toISOString().slice(0, 10);
            const title = 'Link-rot report (rolling)';
            const body = [
              `Automated sweep from ${date} — \`bun run check-links\`.`,
              '',
              `**${summary}**`,
              '',
              'DEAD urls need a `dead_links` entry (stubs below); CHECK urls are bot-blocked or erroring and need a human look. See the workflow run for the full log.',
              '',
              '```',
              report.length > 60000 ? report.slice(0, 60000) + '\n… (truncated — see workflow log)' : report,
              '```',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-rot',
              per_page: 1,
            });
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Refreshed ${date}: **${summary}**`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['link-rot'],
              });
            }
