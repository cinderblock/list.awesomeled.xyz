notes: Raspberry Pi Zero cape running FPP (Pi Zero W/2W recommended; Wi-Fi via the Pi - the Zero has no Ethernet port). 2 eFuse-protected ports, up to 800 pixels each (with power injection) at 40FPS, 6A per port, 5-24V input powers both cape and Pi. Small GPIO/i2c header; no OLED, buttons, or RTC.
inputs:
