name: M8 Port Pixel
status: discontinued
creator:
  name: Microcyb
  url: https://www.microcyb.com
  page: https://www.microcyb.com/index.html#!/M8-PI-Raspberry-Pi-8-Port-Pixel-controller/p/471859299/category=0
notes: Raspberry Pi 3B+ or above HAT running FPP (Falcon Player).
inputs:
  physical:
    Ethernet: true
  standalone: true # FPP plays sequences from the Raspberry Pi
  requires_host: Raspberry Pi # 3B+ or above
outputs:
  count: 8
  connector:
    ref: mtsb-combicon
  driver:
    buffered: true
  clocked: selectable # single (async) or clocked pixels
  pixels:
    max_per_output: 1600 # 12800 total / 8 outputs
power:
  voltage:
    max: 12
  current:
    max: 30
