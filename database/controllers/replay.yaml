name: Replay
status: discontinued
creator: Smartshow
notes: Replays Jinx and xLights files on 4 separate 680 pixel outputs
inputs:
  physical:
    Ethernet: true
  standalone: true # plays FSEQ/PSEQ sequence files from SD card
outputs:
  count: 4
  connector:
    ref: mtsb-combicon
  driver:
    buffered: true
  pixels:
    max_per_output: 680
  clocked: false # async (clockless) pixels only
  protocols:
    - WS2812
    - SK6812
power:
  voltage:
    max: 24
data:
  storage:
    - type: SD
price: 80
software:
  works_with:
    - xLights
    - Jinx
