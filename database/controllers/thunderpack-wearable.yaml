name: ThunderPack Wearable
status: active
release_year: 2020
creator:
  name: Jeremy Gillick Labs
  page: https://www.tindie.com/stores/jeremy/
vendors:
  - name: Tindie
    page: https://www.tindie.com/stores/jeremy/
notes: 1.4 - 2.3A output per PWM channel. RGB PWM and/or addressable LEDs.
inputs:
  physical:
    USB: true # USB bootloader for programming
    GPIO: 12
    buttons: true
  standalone: true # battery-powered, runs Arduino/CircuitPython firmware
outputs:
  count: 4 # high-power PWM MOSFET channels
  connector: Solder
  current:
    max: 2.3 # per high-power PWM channel
power:
  current:
    max: 10
core:
  family: STM32
features:
  - Integrated 18650 lithium battery and charger
  - 4 high-power PWM MOSFET outputs (1.4-2.3A each)
  - Status LEDs
  - Runs Arduino or CircuitPython
price: 40
software:
  firmware:
    - Arduino
    - CircuitPython
