name: Reactivo 2
status: active
release_year: 2020
creator:
  name: LED Strip Studio
  url: https://ledstripstudio.com
  page: https://reactivo.lighting/first-touch/
inputs:
  physical:
    Ethernet: true
    Wi-Fi: true
  standalone: true
outputs:
  count: 1
  connector: Phoenix Plug
  pixels:
    max_per_output: 1024
  clocked: selectable # supports both clocked (Data + Clock / SPI) and clockless pixels
  driver:
    buffered: true
power:
  voltage:
    max: 24
  current:
    max: 5
data:
  storage:
    - type: SD
features:
  - Screen grabber (screen capture to pixels)
  - Web interface
  - Mobile app
  - Sensors and triggers management
