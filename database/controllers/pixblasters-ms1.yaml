name: PixBlasters MS1
status: unknown
creator: Pixblasters
notes: Connects to a PC or Mac (or other device) over HDMI and acts like a monitor. Outputs a selected section of the screen to a matrix of LED strips or to prefab LED panels at up to 60 FPS. Up to 48 controllers can be daisy-chained via Ethernet to drive up to 786,432 pixels. Strip power must be supplied by external power sources; 5V and 12V both work.
inputs:
  physical:
    HDMI: true
    SD Card: true
    Ethernet: Daisy-chain # cascade multiple controllers, not a control-protocol input
  standalone: false
outputs:
  count: 32
  connector: Header strip
  clocked: selectable
  pixels:
    max_per_output: 512
  driver:
    buffered: false
power:
  voltage:
    max: 5
price: 375
