name: LeDMX4 MAX
status: active
release_year: 2022
creator:
  name: DMXking
  url: https://dmxking.com
  page: https://dmxking.com/led-pixel-control/ledmx4-max
notes: Show record and playback trigger capability
inputs:
  physical:
    Ethernet: true
    Wi-Fi: true
  standalone: true # plays from SD card without external controller
outputs:
  count: 4
  connector:
    ref: mtsb-combicon
  driver:
    buffered: true
  pixels:
    max_per_output: 1020 # 4080 total across 4 outputs
  clocked: selectable # supports both clocked and clockless pixels
  auxiliary:
    DMX512: 1
power:
  voltage:
    max: 24
  current:
    max: 32
data:
  storage:
    - type: SD
price: 299
