name: 8 Port LED Distro
status: active
creator:
  name: Bong69
  page: https://www.tindie.com/products/bong69/8-port-led-distro
vendors:
  - name: Wasatch Lights
inputs:
  physical:
    Ethernet: true # RJ45 onboard
  protocols:
    - sACN # E1.31
    - DDP
  standalone: true # WLED firmware can play effects without a host
outputs:
  count: 8
  connector:
    ref: mtsb-combicon
  clocked: false # single-wire / async pixels
  auxiliary:
    GPIO: 7 # GPIO17, 32, 33, 34, 35, 36, 39 broken out for buttons/mics/sensors
power:
  voltage:
    min: 12 # V4 (current production); V3 (discontinued) was 5-24V
    max: 48
core:
  family: ESP32
features:
  - Runs WLED (pre-installed) or ESPixelStick firmware
  - Pluggable Phoenix connectors for outputs
price: 65
software:
  firmware:
    - WLED
    - ESPixelStick
technical_notes:
  - Open hardware; design files and WLED/ESP32 firmware at https://github.com/bobko69/8PortLEDDistro
  - 'Versions: V4 (current) accepts 12-48V; V3 (discontinued) accepted 5-24V'
wled_compatible: true
