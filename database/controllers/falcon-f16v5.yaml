name: Falcon F16V5
status: active
creator:
  name: PixelController, LLC
  url: https://pixelcontroller.com
  page: https://pixelcontroller.com/store/featured/88-f16v5.html
notes: 16 local pixel outputs expandable to 32 via SmartReceivers; 192 universes in.
inputs:
  physical:
    Ethernet: Dual # 2-port switch for daisy-chaining
    Wi-Fi: 2.4GHz # onboard ESP-07 module
  protocols:
    - Art-Net
    - sACN # E1.31
    - DDP
  standalone: true # Falcon Player (FPP) remote mode plays from microSD
outputs:
  count: 16
  differential: true # SmartReceiver (SRx) ports extend to 32 strings
  pixels:
    max_per_output: 1024
  clocked: selectable
  auxiliary:
    DMX512: 1 # RS-485 on RJ45 (DMX / Renard)
power:
  voltage:
    min: 5
    max: 13
data:
  storage:
    - type: uSD
features:
  - Per-output resettable e-fuses with current/voltage/fuse status in web UI
  - OLED status display
  - Two-way SmartReceiver communication (reports current, voltage, fuse status)
price: 280
related:
  - type: predecessor
    ref: controllers/falcon-f16v4
technical_notes:
  - 192 universes of E1.31 / Art-Net plus DDP
  - 1024 pixels per output; supports 70+ pixel IC types
