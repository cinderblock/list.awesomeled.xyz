name: Pixelbox
status: discontinued # replaced by PixelBOX 8 AMP
creator:
  name: Lumikit
  url: https://www.lumikit.com.br
  page: https://lumikit.com.br/pixelbox
inputs:
  physical:
    Ethernet: true # 10/100 Mbps, selectable
    USB: true # firmware updates via USB pen drive
  protocols:
    - Art-Net
outputs:
  count: 2 # two signal output lines
  connector: Quick data connectors
  pixels:
    max_per_output: 1365 # 2730 total single-wire / 2 outputs
  auxiliary:
    DMX512: 1 # on DMX variant models
data:
  fps: 30 # 15-30 FPS depending on pixel chip
price: 199
technical_notes:
  - Up to 2730 single-wire pixels (1365 dual-wire) split across 2 output lines
  - Controls WS2801, WS2811, WS2812, WS2813, UCS1903, APA102 and others
  - 16 DMX universes single-wire (8 universes dual-wire) over Art-Net
