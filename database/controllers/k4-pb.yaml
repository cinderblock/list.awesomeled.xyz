name: K4-PB
status: active
creator:
  name: KulpLights, LLC
  url: https://kulplights.com
  page: https://kulplights.com/product/k4-pb/
notes: PocketBeagle/PocketBeagle2 cape running FPP (networking via USB adapter on the host - Ethernet preferred, Wi-Fi works; FPP image on the host microSD). 4 eFused ports with current monitoring, pixel counting, and fuse alerts; each port drives 800+ pixels at 40FPS with power injection. 5V/12V selectable via jumpers.
inputs:
  physical:
    Ethernet: true # via USB-to-Ethernet adapter on the host
    Wi-Fi: true # via USB adapter on the host
    USB: true
  standalone: true # FPP on the PocketBeagle host
  requires_host: PocketBeagle
outputs:
  count: 4
  pixels:
    max_per_output: 1600
  clocked: false
  connector:
    ref: mtsb-combicon
  driver:
    buffered: true
  auxiliary:
    DMX512: 1 # 3-pin UART header: one DMX universe or PixelNet/Renard/LOR
power:
  voltage:
    max: 12
  current:
    max: 20
data:
  storage:
    - type: uSD # FPP image on the host microSD
features:
  - Per-port resettable eFuses with current monitoring and fuse alerts
  - Pixel counting test pattern
  - Power injection per port
price: 70
technical_notes:
  - 4 eFused ports, each driving 800+ pixels at 40FPS
  - 3-pin UART header for one DMX universe or PixelNet/Renard/LOR
  - 5V/12V selectable via jumpers
