name: DiGidot C4 Live 12
status: active
creator:
  name: DiGidot Technologies BV
  url: https://digidot.eu
  page: https://digidot.eu/compact-controllers/1254-digidot-c4-live.html
notes: Long range data transmission extenders available.
inputs:
  physical:
    Ethernet: true # 2x RJ45 with onboard 100Mbit switch
    Wi-Fi: true
    USB: true
  protocols:
    - Art-Net
    - sACN # E1.31
  standalone: false
outputs:
  count: 4
  connector:
    ref: mtsb-combicon
  clocked: selectable # Single (Data) and Clock+Data SPI protocols
  driver:
    buffered: true
  auxiliary:
    DMX512: 2 # I/O ports configurable as up to two DMX in/out
power:
  voltage:
    max: 24
features:
  - Supports 60+ Data and Clock+Data SPI pixel protocols
  - DIN-rail mountable
price: 330
technical_notes:
  - Up to 16 universes (8192 channels) depending on license
