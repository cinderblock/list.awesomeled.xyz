name: K8-B
status: active
creator:
  name: KulpLights, LLC
  url: https://kulplights.com
  page: https://kulplights.com/product/k8-b/
notes:
  BeagleBone Black cape running FPP (Ethernet/storage via the BBB). 8 fused
  local ports drive 800 pixels each at 40FPS (1500 at 20FPS); 3 RJ45 ports
  add 12 strings via differential receivers, plus 16 more via
  F16v3-compatible expansion boards. Two UARTs drive DMX/Renard/LOR.
inputs:
  physical:
    Ethernet: true # via the BeagleBone Black host
  standalone: true # Falcon Player (FPP) plays from microSD
  requires_host: BeagleBone Black
outputs:
  count: 36 # 8 local + 12 differential + 16 expansion
  connector: Phoenix Screw/RJ45
  driver:
    buffered: true
  differential: true # 12 strings via differential receivers on 3 RJ45 ports
  clocked: false # async pixels only
  auxiliary:
    DMX512: 2 # two UARTs drive DMX/Renard/LOR
power:
  voltage:
    max: 12
  current:
    max: 30
data:
  storage:
    - type: uSD
features:
  - 8 fused local outputs
  - Differential receiver outputs
  - F16v3-compatible expansion board support
price: 80 # board-only; vendor lists $80-$165 depending on BeagleBone/SD options
technical_notes:
  - 8 local ports drive 800 pixels each at 40FPS (1500 at 20FPS)
  - 12 channels require differential receivers
  - 16 additional strings via F16v3-compatible expansion boards
