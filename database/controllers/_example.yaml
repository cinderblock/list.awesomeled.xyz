# Example 1: Full-featured Ethernet controller with all fields populated
name: Example Controller Pro
status: active
release_year: 2024
creator:
  name: Example Company
  url: https://example.com
  page: https://example.com/controller-pro
manufacturers:
  - Example Manufacturing
  - Alternative Manufacturer
vendors:
  - name: Example Company
    url: https://example.com
    page: https://example.com/controller-pro
    warranty: 2 years
  - LED Supplier B # name shorthand
notes: Flagship controller with all premium features

inputs:
  physical:
    Ethernet: Dual
    Wi-Fi:
      - 2.4GHz
      - 5GHz
    Bluetooth: 5 LE
    buttons: 2 # besides dedicated reset
  protocols:
    - Art-Net
    - sACN # E1.31
  standalone: true

outputs:
  connector:
    ref: phoenix-screw-3.81mm # Reference to a connector in the connectors database
    pins: 4
  count: 16
  fuse: Mini ATC
  driver: # for data lines
    IC: 74AHCT125
    replaceable: true
    impedance: 100
  current:
    max: 5
  differential: true
  pixels:
    max_per_output: 1024
  protocols:
    - WS2812B
    - SK6812
  clocked: always # or "selectable" or "false"
  auxiliary:
    DMX512: 1
    TTL: 4
    Servo: 2

power:
  connector:
    oem: Phoenix Contact
    type: Screw
    pitch: 5.08
    pins: 2
    count: 2 # Half and Half
  current:
    max: 30
  voltage:
    max: 24
    min: 5

case:
  material: Aluminum
  color: Black
  dimensions: 200x150x50mm
  mounting: VESA 75
  waterproof: IP65

data:
  fps: 120
  size: 49152 # bytes
  formats:
    - RGB
    - RGBW
  bit_depths:
    - 8
    - 16
  storage:
    - type: uSD
      max_size: 128 # GB
      features:
        - FAT32 support
        - Automatic log rotation

features:
  - Per-port current sensing
  - Over-temperature shutdown
  - Web-based configuration interface
  - Built-in sequencer with pattern editor

images:
  # Preferred form: object with source/credit so attribution travels with the file
  - file: example-controller-pro.jpg
    source: https://example.com/controller-pro
    credit: Example Company
  # Bare filenames stay valid (legacy / self-made photos)
  - example-controller-pro-back.jpg
  - example-controller-pro-wiring.jpg

price: # dollars or string with currency symbol or more detailed array for different configurations
  - name: Basic license
    price: 199.99
    pixels: 4096
  - name: Pro license
    price: 299.99
    pixels: 16384
  - name: Enterprise license
    price: 499.99

technical_notes:
  - Maximum 1000 pixels per output at 60fps with RGBW
  - PoE+ provides up to 25W for controller operation only
  - Differential outputs require matching receivers (sold separately)

wled_compatible: false
---
# Example 2: Budget WLED-compatible controller with minimal fields
name: Example WLED Mini
status: active
creator: null
manufacturers:
  - Generic Factory
vendors:
  - AliExpress Seller
notes: Budget-friendly option for small installations

inputs:
  physical:
    Wi-Fi: 2.4GHz
  standalone: true

outputs:
  connector: JST-SM 3-pin
  count: 4
  driver:
    notes: Direct ESP32 GPIO output at 3.3V, may need level shifter
  pixels:
    max_per_output: 256
  protocols:
    - WS2812B

power:
  voltage:
    max: 5
    min: 5

case:
  waterproof: false

data:
  storage:
    - type: Flash
      features:
        - WLED firmware pre-installed

price: 12.99
wled_compatible: true
---
# Example 3: Raspberry Pi-based controller requiring host
name: Example Pi HAT Controller
status: active
release_year: 2023
creator: Open Source Project
manufacturers:
  - Community PCB
notes: Requires Falcon Player or similar software on host Pi

inputs:
  physical:
    USB: true
    Ethernet: true
  standalone: false
  requires_host: Raspberry Pi 3/4/5

outputs:
  connector: Screw Terminal
  count: 8
  driver:
    buffered: true
  pixels:
    max_per_output: 1000
  protocols:
    - WS2812B

case:
  waterproof: IP20

data:
  storage: null
---
# Example 4: Discontinued legacy controller
name: Example Legacy Controller
status: discontinued
release_year: 2018
creator: Defunct Company
manufacturers:
  - Defunct Company
notes: No longer manufactured, limited firmware support

inputs:
  physical:
    USB: true
    DMX: true
  standalone: false

outputs:
  connector: RJ45
  count: 8
  driver:
    buffered: true
  pixels:
    max_per_output: 256
  protocols:
    - WS2812B

case:
  waterproof: false

data:
  storage: null

related:
  # Declare relationships on one side only; the other entry's page derives the
  # reverse direction ("Replaces", "Succeeded by", ...) automatically.
  - type: replacement
    ref: controllers/example-controller-pro # in-database: <category>/<filename minus .yaml>
  - type: variant
    name: Example Legacy Controller XL # not in the database: name (+ optional url)
    url: https://example.com/legacy-xl
    notes: Same board with 16 outputs
---
# Example 5: Industrial controller with limited availability
name: Example Industrial Controller
status: limited
release_year: 2022
creator: Industrial LED Corp
manufacturers:
  - Industrial LED Corp
vendors:
  - Industrial Distributor
notes: Industrial-grade controller for permanent installations

inputs:
  physical:
    Ethernet: true
    PoE: PoE++
  protocols:
    - Art-Net
    - sACN
  standalone: true

outputs:
  connector: Phoenix Contact
  count: 48
  driver:
    buffered: true
  differential: true
  current:
    max: 2
  pixels:
    max_per_output: 1024
  protocols:
    - WS2812B
    - APA102
  clocked: selectable

power:
  current:
    max: 100
  voltage:
    max: 48

case:
  waterproof: IP67

data:
  storage:
    - type: SD

features:
  - Industrial eFuse
  - Current monitoring per port
  - Remote diagnostics

price:
  # Non-USD price: keep the original currency; tables sort by USD equivalent
  amount: 1500
  currency: EUR

