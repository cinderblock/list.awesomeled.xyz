name: Standard Differential Receiver
status: unknown
creator:
  name: Microcyb
  url: https://microcyb.com
  page: https://microcyb.com
notes: "Not a standalone controller: receives differential pixel data over an RJ45 cable (150+ ft) from a host pixel controller (Kulp/Falcon K16, K32, W16, etc.). 4 ports, up to 1600 pixels per port at 20 FPS (800 at 40 FPS), 5/12V selectable."
inputs:
  physical:
    Serial: true # differential pixel data in over RJ45
  protocols:
    - DMX
  standalone: false
outputs:
  count: 4
  connector: Phoenix Screw
  differential: true
  driver:
    buffered: true
  pixels:
    max_per_output: 1600
  clocked: selectable
power:
  voltage:
    max: 12
    min: 5
price: 22
technical_notes:
  - 1600 pixels per port at 20 FPS (800 at 40 FPS)
  - 5/12V selectable output voltage
  - Receives differential signal over RJ45 from a host controller, usable 150+ ft away
