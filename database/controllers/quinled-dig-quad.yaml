name: QuinLED-Dig-Quad
status: active
release_year: 2020
creator:
  name: Quindor / Intermittent Technology
  page: https://quinled.info/quinled-dig-quad/
notes: ESP8266/ESP32 based, open to any software, often run with WLED
core:
  family: ESP32
inputs:
  physical:
    Wi-Fi: 2.4GHz # via plug-in QuinLED-ESP32 module; wired Ethernet ESP32 variant optional
  standalone: true # commonly runs WLED firmware
outputs:
  count: 4
  connector: 5mm screw terminal
  clocked: selectable # supports single-wire and clocked (e.g. SK9822/APA102) strips
  driver:
    buffered: true # level-shifted output per channel
power:
  voltage:
    max: 24
  current:
    max: 30
features:
  - Per-output level shifters
  - Onboard fuses with power distribution terminals
  - Reverse polarity protection
price: 38
wled_compatible: true
