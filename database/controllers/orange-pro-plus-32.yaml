name: Orange Pro Plus 32
status: active
creator:
  name: Winterlights India
  url: https://www.winterlights.in
  page: https://www.winterlights.in/product-page/orange-pro-plus-32-48000-pixel-controller
notes: >-
  Vendor lists 16 direct pixel ports plus 16 long-range ports on 4 RJ45 jacks (32 total in the name), so output count reflects direct ports only. Data-only outputs with no V+ pass-through; plays FPP sequences from microSD.
inputs:
  physical:
    Ethernet: true
  protocols:
    - Art-Net
    - sACN # E1.31
    - DDP
  standalone: true # plays FPP sequences from microSD
outputs:
  count: 16
  connector:
    ref: mtsb-combicon
  driver:
    buffered: true
  clocked: false # async (Single and Clock pixel types, data-only)
  auxiliary:
    long-range: 16 # 16 long-range data ports on 4 RJ45 jacks
power:
  voltage:
    max: 24
data:
  storage:
    - type: uSD
price: 275
