id: www-orangepi-dmx-org
name: www.orangepi-dmx.org
status: active
creator:
  name: Arjan van Vught (Open Source)
  url: http://www.orangepi-dmx.org
  page: http://www.orangepi-dmx.org
notes: Unique central configuration with human readable UDP messages. No FPS limit except what is given for the pixel protocol.
inputs:
  physical:
    Ethernet: true
  standalone: true
outputs:
  count: 8
  pixels:
    max_per_output: 680 # 5440 total / 8 outputs
  driver:
    buffered: true
  clocked: selectable # supports both clocked and clockless pixels
price: 50
wled_compatible: false
