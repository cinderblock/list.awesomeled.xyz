name: M4 Port Pixel
status: active
creator:
  name: Microcyb
  url: https://www.microcyb.com
  page: https://www.microcyb.com/index.html#!/M4-PI-Raspberry-Pi-4-Port-Pixel-controller/p/468426786/category=0
notes: Raspberry Pi 3B+ or above cape running FPP (Falcon Player).
inputs:
  physical:
    Ethernet: true # via host Raspberry Pi
  standalone: true # plays from host running FPP
  requires_host: Raspberry Pi
outputs:
  count: 4
  connector: Phoenix Screw
  driver:
    buffered: true
  pixels:
    max_per_output: 1600
  clocked: selectable # single or clocked pixels
power:
  voltage:
    max: 12
  current:
    max: 30
data:
  storage:
    - type: uSD # microSD on host Raspberry Pi
price: 35
