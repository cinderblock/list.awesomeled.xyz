name: Falcon F48
status: active
creator:
  name: PixelController, LLC
  url: https://pixelcontroller.com
  page: https://www.pixelcontroller.com/store/index.php?id_product=52&controller=product
notes: 48 differential pixel outputs via remote receiver boards (4 outputs each).
inputs:
  physical:
    Ethernet: Dual # 2-port switch for daisy-chaining
  protocols:
    - Art-Net
    - sACN # E1.31
  standalone: true # Falcon Player (FPP) remote mode plays FSEQ from SD card
outputs:
  count: 48
  connector:
    notes: to differential SmartReceiver boards
    ref: rj45
  differential: true
  driver:
    buffered: true
  pixels:
    max_per_output: 1022 # 1022 @ 20fps, 680 @ 40fps
  clocked: false
  auxiliary:
    DMX512: 3
power:
  voltage:
    min: 5
    max: 5
data:
  storage:
    - type: uSD
features:
  - OLED status display
  - 2-port Ethernet switch for daisy-chaining
  - Reverse-polarity protected 5V input
price: 200
related:
  - type: related
    ref: controllers/falcon-f16v4
    notes: Falcon family sibling; all-differential outputs
