name: Brightly
status: discontinued
release_year: 2021
creator:
  name: Polytronic
  page: https://glowbrightly.io/
notes: Modular breakouts allow for direct screw terminal plug or differential RJ45 outputs that can run over 1000ft to a receiver
inputs:
  physical:
    Ethernet: true
    SD Card: true
  protocols:
    - Art-Net
    - sACN
    - OPC
    - MadLED
  standalone: true
outputs:
  connector: Screw Terminal & RJ45
  count: 8
  differential: true # RJ45 breakouts run differential over 1000ft to a receiver
  driver:
    buffered: true
  pixels:
    max_per_output: 1024 # 8192 total across 8 outputs
  clocked: selectable # single and clocked pixel types
  auxiliary:
    DMX512: 1
power:
  voltage:
    min: 5 # compatible with 5V & 12V LEDs
    max: 12
  current:
    max: 40
data:
  storage:
    - type: SD
dead_links:
  - url: https://glowbrightly.io/
    archive: https://web.archive.org/web/20250416032520/https://glowbrightly.io/
    checked: '2026-07-01'
price: 200
