name: QuinLED-Dig-Uno
status: active
release_year: 2019
creator:
  name: Quindor / Intermittent Technology
  url: https://quinled.info
  page: https://quinled.info/quinled-dig-uno/
notes: ESP32 based (custom QuinLED-ESP32 top board, USB-C), ships with WLED pre-installed; board/external antenna options, Ethernet on select variants.
inputs:
  physical:
    Wi-Fi: 2.4GHz # ESP32, board/external antenna options
    USB: true # USB-C on QuinLED-ESP32 top board
  protocols:
    - DMX512
  standalone: true # commonly runs WLED
outputs:
  count: 2
  connector: 5mm screw terminal
  fuse: 10A # 10A fuse included; 15A continuous / 25A max copper rating
  driver:
    buffered: true
  clocked: selectable # Single and Clock (both)
  pixels:
    max_per_output: 1024 # 2048 total across 2 outputs
power:
  voltage:
    max: 24
  current:
    max: 15
core:
  family: ESP32
features:
  - Available as DIY kit or pre-assembled
  - Ships with WLED pre-installed
price: 27.5
software:
  firmware:
    - WLED
wled_compatible: true
