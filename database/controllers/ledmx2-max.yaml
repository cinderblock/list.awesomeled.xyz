name: LeDMX2 MAX
status: active
release_year: 2022
creator:
  name: DMXking
  url: https://dmxking.com
  page: https://dmxking.com/led-pixel-control/ledmx2-max
notes: Show record and playback trigger capability
inputs:
  physical:
    Ethernet: true
  protocols:
    - Art-Net
    - sACN # E1.31
  standalone: true
outputs:
  count: 2
  connector: Phoenix Screw
  driver:
    buffered: true
