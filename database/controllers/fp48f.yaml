name: FP48F
status: discontinued
release_year: 2022
creator:
  name: GO 3D France
  page: https://go3d.fr/produit/controleur-de-pixels-fp48f/
notes: Beagle Bone Based, 48 Outputs, On Board RTC, Full Linux OS runs FPP
inputs:
  physical:
    Ethernet: true
  protocols:
    - Art-Net
  standalone: true # runs Falcon Player (FPP)
  requires_host: BeagleBone Black
outputs:
  count: 48
  connector:
    ref: mtsb-combicon
  driver:
    buffered: true
  pixels:
    max_per_output: 1360 # 65280 total / 48 outputs
  clocked: false # async pixel types
power:
  voltage:
    max: 24
data:
  storage:
    - type: SD
dead_links:
  - url: https://go3d.fr/produit/controleur-de-pixels-fp48f/
    # Product page was never captured; nearest good capture is the shop's 2022
    # homepage. The domain now belongs to an unrelated pest-control company,
    # so the default latest-capture fallback would show the wrong site.
    archive: https://web.archive.org/web/20221208030737/https://go3d.fr/
    checked: 2026-07-01
    notes: Vendor site is gone; go3d.fr was re-registered by an unrelated company
features:
  - On-board RTC
price: 190
software:
  firmware:
    - FPP
