name: APD-2-500-12v-ART
status: active
creator: Abstract AVR
vendors:
  - name: Digital Tape
    page: https://www.digitaltape.co.uk/pixel-drivers
notes: On board Sound To Light, 31 channel DMX Macro mode.
inputs:
  physical:
    Wi-Fi: true
    Ethernet: true
  protocols:
    - Art-Net # "ART" in product name
  standalone: false
outputs:
  count: 2
  connector: Phoenix Screw
  driver:
    buffered: true
  clocked: false # async pixels
  pixels:
    max_per_output: 500 # 1000 total across 2 outputs
power:
  voltage:
    max: 12
  current:
    max: 5
features:
  - Onboard Sound To Light
  - 31 channel DMX Macro mode
