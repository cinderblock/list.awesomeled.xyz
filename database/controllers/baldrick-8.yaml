name: Baldrick8
status: active
release_year: 2025
creator:
  name: ILIGHTTHAT
  url: https://www.ilightthat.com
  page: https://www.baldrickboard.com/en/boards/baldrick8
notes: V1.1 supports 48V
inputs:
  physical:
    Ethernet: true
  protocols:
    - DDP
    - Art-Net
    - sACN # E1.31
  standalone: false
outputs:
  connector: Phoenix Plug
  count: 8
  fuse: 7.5A # resettable, per output
  driver:
    buffered: true
  differential: false # single-ended outputs
  pixels:
    max_per_output: 750 # ~2250 channels per port at 40fps
  clocked: false # async pixels
power:
  voltage:
    min: 5
    max: 24 # up to 48V on V1.1
  current:
    max: 60
images:
  - baldrick-8.webp
price: 80
