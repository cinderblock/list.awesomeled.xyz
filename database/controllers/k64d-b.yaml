name: K64D-B
status: active
creator:
  name: KulpLights, LLC
  url: https://kulplights.com
  page: https://kulplights.com/product/k64d-b/
notes: BeagleBone Black cape running FPP (Ethernet/storage via the BBB; Wi-Fi only if paired with a BBB Wireless host). 16 RJ45 differential ports driving 64 strings via standard or v1/v2 Smart receivers. Two UART differential outputs for DMX/Renard/LOR/PixelNet. Onboard sound, FM transmitter optional.
inputs:
  physical:
    Ethernet: true # provided by the BeagleBone Black host
  standalone: true # Falcon Player (FPP)
  requires_host: BeagleBone Black
outputs:
  connector:
    ref: rj45
  count: 64 # 16 RJ45 differential ports, 4 strings each via Smart receivers
  differential: true
  clocked: false # async pixels only
  auxiliary:
    DMX512: 2 # two UART differential outputs (DMX/Renard/LOR/PixelNet)
power:
  voltage:
    max: 5
data:
  storage:
    - type: uSD # via the BeagleBone Black host
features:
  - Onboard sound
  - Optional FM transmitter
price: 130 # board-only per kulplights.com
software:
  firmware:
    - FPP
technical_notes:
  - Up to 80000 pixels total across all outputs
