name: K40D-PB
status: active
creator:
  name: KulpLights, LLC
  url: https://kulplights.com
  page: https://kulplights.com/product/k40d-pb/
notes: PocketBeagle/PocketBeagle2 cape running FPP from an SD card; networking via a USB Ethernet (preferred) or Wi-Fi adapter on the host - do not use USB tethering. 10 RJ45 differential ports drive 40 pixel strings; two ports can instead output four DMX universes, plus a UART differential output for DMX/Renard/LOR/PixelNet. Powered by external 5V via screw terminals. Formerly sold as the F40D-PB before Kulp's K-series renaming.
inputs:
  physical:
    Ethernet: true # via USB Ethernet adapter on host (preferred)
    Wi-Fi: true # via USB WiFi adapter on host
  standalone: true # runs FPP (Falcon Player) from SD card
  requires_host: PocketBeagle # cape for PocketBeagle / PocketBeagle2
outputs:
  connector:
    ref: rj45
  count: 40 # 10 RJ45 ports drive 40 pixel strings
  differential: true
  pixels:
    max_per_output: 1600 # 64000 total / 40 outputs
  clocked: false # async pixels
  auxiliary:
    DMX512: 4 # two RJ45 ports can output four DMX universes
power:
  voltage:
    max: 5
data:
  storage:
    - type: SD
price: 115
software:
  firmware:
    - FPP
