name: Harting Han/ Lectriflex
creator: Harting
notes: Harting Han rectangular AKA 16 pin Lectriflex as alternative to Socapex
  in stage lighting. Multi pin mains connector , modular able to have power ,
  data and even hose lines on one connector.
ratings:
  max_current: 25 A
  max_voltage: 450 V
  ip_rating: IP40
mechanical:
  outline: Rectangular
  contact_type: Pins
  min_pins: 2
  max_pins: 36
  gendered: true
  locking: Latching
  panel_mount: true
  wire_to_wire: true
  pcb_mount: false
  board_fingers: false
termination:
  solder: true
  screw_terminal: true
  crimp: true
  idc: true
  smallest_gauge: 28 AWG
  largest_gauge: 10 AWG
links:
  product: https://www.harting.com/US/en/heavy-duty-electrical-connectors#Han%C2%AE-Rangee
