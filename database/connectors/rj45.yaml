name: RJ45 (8P8C)
creator: null
manufacturers:
  - Amphenol
  - TE Connectivity
  - Molex
  - Many generic
notes: Ubiquitous 8-position 8-contact modular jack. In LED rigs it carries Ethernet (Art-Net/sACN/DDP), differential pixel data to long-range receivers, and DMX-over-RJ45.
aliases:
  - 8P8C
  - Ethernet connector
  - Modular jack
common_applications:
  - Ethernet for Art-Net / sACN / DDP controllers
  - Differential pixel data to long-range / Smart receivers over Cat5/Cat6
  - DMX512 over RJ45 (e.g. Falcon, Renard)
  - Daisy-chaining controllers via built-in network switches
ratings:
  max_current: 1.5 A
  max_current_notes: Per contact, typical for 8P8C
  max_voltage: 125 V
  ip_rating: null
  ip_rating_notes: Standard jacks are unsealed; ruggedized IP67/IP68 variants exist
mechanical:
  outline: Rectangular
  contact_type: Spring blade
  pitch: 1.02 mm
  min_pins: 8
  max_pins: 8
  rows: 1
  gendered: true
  locking: Latching # plastic retention tab
  panel_mount: true
  wire_to_wire: false
  pcb_mount: PTH
  board_fingers: false
termination:
  solder: true
  crimp: true
  crimp_tool: RJ45 modular crimper
  idc: true
  smallest_gauge: 26 AWG
  largest_gauge: 22 AWG
wiring:
  pinout: T568A / T568B for Ethernet; pixel and DMX pinouts vary by vendor
  convention: TIA/EIA-568
