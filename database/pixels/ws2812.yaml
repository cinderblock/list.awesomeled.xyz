name: WS2812
status: active
release_year: 2012
creator: WorldSemi
notes: Individually addressable RGB pixel; cheap and everywhere
color:
  order: GRB
  brightness_bits: 8
  pwm_frequency: 2.0kHz
  pwm_frequency_notes: 400Hz is an old PWM spec. Newer WS2812b (post 2018) use updated IC with 2.0kHz PWM rate same as WS2813
data:
  type: WS2811/12
  clocked: false
  bitrate: 800kHz
  pixel_size_bits: 24
  backup_line: false
datasheet:
  url: https://cdn-shop.adafruit.com/datasheets/WS2812.pdf
  discrepancies:
    - Datasheet claims max 49mA but actual is ~18-22mA per channel
    - Vds max of 26V is misleading - LEDs are integrated at 5V
electrical:
  led_voltage: 5V
  led_voltage_notes: Datasheet claims "26V Vds, Max" but LEDs are built-in and share power with 5V VDD
  vcc_voltage: 5V
  gpio:
    min: 3.0V
    max: 5V
  channel_current: 18.5mA
  channel_current_notes: Datasheet states max 49mA current, but graph for 5050 package shows R=19mA, G,B=22mA. 3535 package has lower current
  quiescent_current: 0.7mA
  wattage: 92.5mW
images:
  - file: ws2812.webp
    source: https://www.adafruit.com/product/1655
    credit: Adafruit Industries
other_links:
  - WS2812 Pixel Protocol Overview | Advatek Lighting
physical:
  package_sizes:
    - '5050'
    - '3535'
    - '2040'
    - '2020'
  package_size: 5050/3535/2040/2020
  pin_count: 4
price: # LCSC C2761795, 2026-07
  - qty: 5
    price: 0.1072
    sku: WS2812B-B/T
  - qty: 1000
    price: 0.0664
    sku: WS2812B-B/T
  - qty: 5000
    price: 0.0613
    sku: WS2812B-B/T
spec_update_year: 2018
technical_notes:
  - PWM frequency updated from 400Hz to 2.0kHz in 2018 silicon revision
  - Datasheet max current (49mA) differs from actual measured values (19-22mA)
  - Available in many package sizes with varying current specs
variants:
  - name: WS2812B
    suffix: B
    differences: Most common variant, improved thermal pad
  - name: WS2812C
    suffix: C
    differences: Further thermal improvements
  - name: WS2812E
    suffix: E
    differences: Extended temperature range
