name: APA102C
status: active
creator: APA Electronics
notes: Very similar to its previous version, APA102, APA102C provides a larger metallic area for better heat dissipation.
color:
  order: BGR
  brightness_bits: 8+5
  brightness_method: pwm
  brightness_method_notes: Extra 5-bit brightness control by overlaying 400Hz PWM on LEDs
  pwm_frequency: 19.2kHz
data:
  type: APA102
  clocked: true
  bitrate: 30MHz
  pixel_size_bits: 32
  pixel_rate_max: 0.94 M Pixel / s
  backup_line: false
  max_per_string: 250
  max_per_string_notes: Clock pulse gets shorter by a few ns every pixel. After ~250 pixels, the clock signal can no longer be reliably retrieved.
datasheet:
  url: https://cdn-shop.adafruit.com/datasheets/APA102.pdf
electrical:
  led_voltage: 5V
  led_voltage_notes: Datasheet claims "26V Vds, Max" but LEDs are built-in and share power with 5V VDD
  vcc_voltage: 5V
  gpio:
    min: 3.5V
    max: 5V
  channel_current: 22mA
  channel_current_notes: 19-22mA in 5050 package, 10mA for 2020 package; extra 5 bits control PWM, not current
  quiescent_current: 1.0mA
  wattage: 110mW
other_links:
  - APA102C Pixel Protocol Overview | Advatek Lighting
physical:
  package_sizes:
    - '5050'
    - '2020'
  package_size: 5050 & 2020
  pin_count: 6
technical_notes:
  - Improved thermal design over APA102
  - Clock signal degrades with each pixel - see https://www.pjrc.com/why-apa102-leds-have-trouble-at-24-mhz/
  - Extra 5-bit brightness control is PWM-based, not current control
